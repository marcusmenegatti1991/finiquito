          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El finiquito es la remuneracion que el empleador debe entregar a un trabajador al concluir la relacion laboral. Incluye adeudos pendientes y prestaciones proporcionales como aguinaldo, vacaciones y prima vacacional, segun la Ley Federal del Trabajo de Mexico."

        {
          "@type": "Question",
          "name": "Cual es la diferencia entre finiquito y liquidacion?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El finiquito aplica en todos los casos de terminacion laboral (renuncia o despido justificado). La liquidacion procede unicamente cuando la terminacion es por causa imputable al empleador (despido injustificado) e incluye indemnizacion adicional de 3 meses de salario mas 20 dias por ano."
          }
        },
        {
          "@type": "Question",
          "name": "Cuanto es el aguinaldo proporcional en el finiquito?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El aguinaldo minimo legal es de 15 dias de salario por ano completo. Si no completaste el ano, se calcula proporcionalmente: (15 / 365) x Dias Laborados x Salario Diario."
          }
        },
        {
          "@type": "Question",
          "name": "Cuantas vacaciones me corresponden en el finiquito?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Minimo 12 dias despues de 1 ano de trabajo, incrementando 2 dias por cada ano adicional hasta 20 dias. Con la reforma de Vacaciones Dignas 2023, el minimo inicial subio a 12 dias. Si terminas antes del ano, se calcula proporcionalmente."
          }
        },
        {
          "@type": "Question",
          "name": "Que es la prima vacacional?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La prima vacacional es un pago adicional equivalente al 25% del salario correspondiente a los dias de vacaciones, segun el Articulo 80 de la Ley Federal del Trabajo."
          }
        },
        {
          "@type": "Question",
          "name": "Cuanto es la indemnizacion por despido injustificado en Mexico?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La indemnizacion por despido injustificado es de 3 meses de salario mas 20 dias de salario por cada ano de servicio, ademas de la prima de antiguedad de 12 dias por ano. Esto se suma al finiquito normal."
          }
        },
        {
          "@type": "Question",
          "name": "Que es la prima de antiguedad?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La prima de antiguedad equivale a 12 dias de salario por cada ano de servicio (Articulo 162 LFT). En finiquito por renuncia aplica solo si tienes mas de 15 anos. En despido injustificado aplica desde el primer ano."
          }
        },
        {
          "@type": "Question",
          "name": "Como calcular el finiquito en Mexico 2026?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Para calcular tu finiquito en Mexico 2026 necesitas sumar: dias laborados no pagados + aguinaldo proporcional + vacaciones proporcionales + prima vacacional. Si fue despido injustificado, agrega: 3 meses de salario + 20 dias por ano + prima de antiguedad. Usa nuestra calculadora gratuita para obtener el resultado exacto."
